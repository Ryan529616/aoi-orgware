name: test

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  PUBLICATION_POLICY_SHA256: 11ad65c25fee5d4060422001a344faa7c8e06b427e452bd7d48a76231e4b905f

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Resolve the hash-locked test-tool wheelhouse
        run: python -m pip download --require-hashes --dest .test-wheelhouse -r requirements/release-tools.lock
      - name: Install the test toolchain offline
        run: python -m pip install --no-index --find-links .test-wheelhouse --require-hashes -r requirements/release-tools.lock
      - name: Install package
        run: python -m pip install --no-build-isolation --no-deps .
      - name: Smoke installed CLI
        run: |
          aoi --version
          aoi --help
      - name: Run unit tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -m pytest -q tests

  package:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - name: Resolve the hash-locked release-tool wheelhouse
        run: |
          python -m pip download \
            --require-hashes \
            --dest .release-wheelhouse \
            -r requirements/release-tools.lock
      - name: Install the release toolchain offline
        run: |
          python -m venv .release-tools
          .release-tools/bin/python -m pip install \
            --no-index \
            --find-links .release-wheelhouse \
            --require-hashes \
            -r requirements/release-tools.lock
          python -m pip install "twine==6.2.0"
      - name: Build wheel and source distribution
        run: .release-tools/bin/python -m build --no-isolation
      - name: Validate distribution metadata
        run: python -m twine check --strict dist/*
      - name: Verify isolated artifact installs
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        shell: bash
        run: |
          expected_version="$(python -c "import runpy; print(runpy.run_path('src/aoi_orgware/_version.py')['__version__'])")"
          python scripts/verify_dist.py \
            --dist-dir dist \
            --expected-version "$expected_version" \
            --build-python .release-tools/bin/python \
            --expected-build-version 1.5.0 \
            --expected-hatchling-version 1.27.0
      - name: Preflight verified distribution artifact upload
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=src python -m aoi_orgware.publication_gate preflight \
            --policy-snapshot release/publication-policy.json \
            --expected-snapshot-sha256 "$PUBLICATION_POLICY_SHA256" \
            --action artifact_upload \
            --destination "https://github.com/$GITHUB_REPOSITORY/actions/artifacts" \
            --subject dist/ \
            --json > ci-package-publication-receipt.json
      - name: Upload verified distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-distributions
          path: |
            dist/*.whl
            dist/*.tar.gz
            ci-package-publication-receipt.json
          if-no-files-found: error

  package-windows-smoke:
    needs: package
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: package-artifact
      - name: Verify the distribution artifact publication receipt
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:PYTHONPATH = 'src'
          Push-Location package-artifact
          try {
            python -m aoi_orgware.publication_gate verify `
              --policy-snapshot "$env:GITHUB_WORKSPACE/release/publication-policy.json" `
              --expected-snapshot-sha256 $env:PUBLICATION_POLICY_SHA256 `
              --receipt ci-package-publication-receipt.json `
              --action artifact_upload `
              --destination "https://github.com/$env:GITHUB_REPOSITORY/actions/artifacts" `
              --subject dist/ `
              --json
            if ($LASTEXITCODE -ne 0) { throw 'distribution artifact publication receipt verification failed' }
          } finally {
            Pop-Location
          }
      - name: Resolve the hash-locked release-tool wheelhouse
        shell: pwsh
        run: |
          python -m pip download `
            --require-hashes `
            --dest .release-wheelhouse `
            -r requirements/release-tools.lock
      - name: Install the release toolchain offline
        shell: pwsh
        run: |
          python -m venv .release-tools
          .\.release-tools\Scripts\python.exe -m pip install `
            --no-index `
            --find-links .release-wheelhouse `
            --require-hashes `
            -r requirements/release-tools.lock
      - name: Verify packaged entry points on Windows
        shell: pwsh
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          $expectedVersion = python -c "import runpy; print(runpy.run_path('src/aoi_orgware/_version.py')['__version__'])"
          python scripts/verify_dist.py `
            --dist-dir package-artifact/dist `
            --expected-version $expectedVersion `
            --build-python .\.release-tools\Scripts\python.exe `
            --expected-build-version 1.5.0 `
            --expected-hatchling-version 1.27.0

  typing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - name: Resolve the hash-locked type-check wheelhouse
        run: |
          python -m pip download \
            --require-hashes \
            --dest .typecheck-wheelhouse \
            -r requirements/typecheck-tools.lock
      - name: Install the type-check toolchain offline
        run: |
          python -m pip install \
            --no-index \
            --find-links .typecheck-wheelhouse \
            --require-hashes \
            -r requirements/typecheck-tools.lock
      - name: Type-check the published package surface (both platforms)
        # The locking/credential code has os.name-guarded branches; check the
        # native platform and an emulated win32 pass so neither side regresses.
        run: |
          python -m mypy src/aoi_orgware --ignore-missing-imports
          python -m mypy src/aoi_orgware --ignore-missing-imports --platform win32

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - name: Install coverage tooling
        run: python -m pip install pytest coverage
      - name: Enable subprocess coverage
        # Most of the suite drives the CLI through real subprocesses; without
        # process_startup the measured number understates coverage by ~30
        # points (54% naive vs 83% subprocess-aware at the 0.3.0a3 baseline).
        run: |
          SITE=$(python -c "import site; print(site.getsitepackages()[0])")
          printf 'import coverage\ncoverage.process_startup()\n' > "$SITE/sitecustomize.py"
      - name: Run suite under coverage
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONPATH: src
          COVERAGE_PROCESS_START: ${{ github.workspace }}/.coveragerc
          COVERAGE_FILE: ${{ github.workspace }}/covdata/.coverage
        run: |
          mkdir -p covdata
          python -m coverage run --parallel-mode -m pytest tests/ -q --tb=short
      - name: Combine and enforce floor
        env:
          COVERAGE_FILE: ${{ github.workspace }}/covdata/.coverage
        run: |
          python -m coverage combine
          python -m coverage report --fail-under=80
