name: test

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package
        run: python -m pip install .
      - name: Smoke installed CLI
        run: |
          aoi --version
          aoi --help
      - name: Run unit tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v

  package:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install package verification tools
        run: python -m pip install build twine
      - name: Build wheel and source distribution
        run: python -m build
      - name: Validate distribution metadata
        run: python -m twine check --strict dist/*
      - name: Verify isolated artifact installs
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        shell: bash
        run: |
          expected_version="$(python -c "import runpy; print(runpy.run_path('src/aoi_orgware/_version.py')['__version__'])")"
          python scripts/verify_dist.py --dist-dir dist --expected-version "$expected_version"
      - name: Upload verified distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error

  package-windows-smoke:
    needs: package
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist
      - name: Verify packaged entry points on Windows
        shell: pwsh
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          $expectedVersion = python -c "import runpy; print(runpy.run_path('src/aoi_orgware/_version.py')['__version__'])"
          python scripts/verify_dist.py --dist-dir dist --expected-version $expectedVersion
