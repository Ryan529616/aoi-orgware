name: Publish Python distributions to PyPI

on:
  release:
    types: [published]

# Deny all GITHUB_TOKEN scopes unless a job explicitly grants one.
permissions: {}

# Serialize releases so two published GitHub Releases cannot upload together.
concurrency:
  group: pypi-publish
  cancel-in-progress: false

jobs:
  build:
    name: Build and verify distributions
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Check out the release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Verify project name, release tag, and source versions
        shell: bash
        run: |
          python - <<'PY'
          import ast
          import os
          from pathlib import Path
          import tomllib

          project = tomllib.loads(
              Path("pyproject.toml").read_text(encoding="utf-8")
          )
          project_metadata = project["project"]

          if project_metadata["name"] != "aoi-orgware":
              raise SystemExit(
                  "Unexpected PyPI project name: "
                  f"{project_metadata['name']!r}"
              )
          if "version" in project_metadata:
              raise SystemExit("pyproject.toml contains a second literal version")
          if project_metadata.get("dynamic") != ["version"]:
              raise SystemExit("pyproject.toml must declare dynamic = ['version']")

          version_path = project["tool"]["hatch"]["version"]["path"]
          if version_path != "src/aoi_orgware/_version.py":
              raise SystemExit(f"Unexpected Hatch version path: {version_path!r}")

          tree = ast.parse(Path(version_path).read_text(encoding="utf-8"))
          source_versions = []
          for node in ast.walk(tree):
              if not isinstance(node, ast.Assign):
                  continue
              if any(
                  isinstance(target, ast.Name)
                  and target.id == "__version__"
                  for target in node.targets
              ):
                  source_versions.append(ast.literal_eval(node.value))
          if len(source_versions) != 1 or not isinstance(source_versions[0], str):
              raise SystemExit(
                  f"Canonical source version is invalid: {source_versions!r}"
              )
          version = source_versions[0]
          expected_tag = f"v{version}"
          ref_name = os.environ["GITHUB_REF_NAME"]
          full_ref = os.environ["GITHUB_REF"]

          if ref_name != expected_tag:
              raise SystemExit(
                  f"Release tag {ref_name!r} does not match "
                  f"pyproject version {version!r}"
              )
          if full_ref != f"refs/tags/{expected_tag}":
              raise SystemExit(f"Unexpected release ref: {full_ref!r}")

          print(f"Verified aoi-orgware {version} from {full_ref}")
          PY

      - name: Install build verification tools
        run: |
          python -m pip install --disable-pip-version-check \
            "build==1.5.0" \
            "twine==6.2.0"

      - name: Run unit tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v

      - name: Build wheel and source distribution
        shell: bash
        run: |
          epoch="$(git show -s --format=%ct HEAD)"
          if [[ ! "$epoch" =~ ^[0-9]+$ ]]; then
            echo "Invalid release commit timestamp" >&2
            exit 1
          fi
          SOURCE_DATE_EPOCH="$epoch" \
            python -m build --sdist --wheel --outdir dist

      - name: Check package metadata
        run: python -m twine check --strict dist/*

      - name: Verify isolated wheel and sdist installs
        shell: bash
        run: |
          expected_version="$(python -c "import runpy; print(runpy.run_path('src/aoi_orgware/_version.py')['__version__'])")"
          python scripts/verify_dist.py \
            --dist-dir dist \
            --expected-version "$expected_version"

      - name: Upload verified distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/aoi-orgware
    permissions:
      id-token: write

    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: dist/

      - name: Publish distributions with Trusted Publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
          verify-metadata: true
          attestations: true
          print-hash: true
