name: Publish Python distributions to PyPI

on:
  release:
    types: [published]

# Deny all GITHUB_TOKEN scopes unless a job explicitly grants one.
permissions: {}

# Serialize releases so two published GitHub Releases cannot upload together.
concurrency:
  group: pypi-publish
  cancel-in-progress: false

jobs:
  build:
    name: Build and verify distributions
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Check out the release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Verify project name, release tag, and source versions
        shell: bash
        run: |
          python - <<'PY'
          import ast
          import os
          from pathlib import Path
          import tomllib

          project = tomllib.loads(
              Path("pyproject.toml").read_text(encoding="utf-8")
          )["project"]

          if project["name"] != "aoi-orgware":
              raise SystemExit(
                  f"Unexpected PyPI project name: {project['name']!r}"
              )

          version = project["version"]
          expected_tag = f"v{version}"
          ref_name = os.environ["GITHUB_REF_NAME"]
          full_ref = os.environ["GITHUB_REF"]

          if ref_name != expected_tag:
              raise SystemExit(
                  f"Release tag {ref_name!r} does not match "
                  f"pyproject version {version!r}"
              )
          if full_ref != f"refs/tags/{expected_tag}":
              raise SystemExit(f"Unexpected release ref: {full_ref!r}")

          tree = ast.parse(
              Path("src/aoi_orgware/__init__.py").read_text(encoding="utf-8")
          )
          source_versions = []
          for node in ast.walk(tree):
              if not isinstance(node, ast.Assign):
                  continue
              if any(
                  isinstance(target, ast.Name)
                  and target.id == "__version__"
                  for target in node.targets
              ):
                  source_versions.append(ast.literal_eval(node.value))

          if source_versions != [version]:
              raise SystemExit(
                  f"Source version {source_versions!r} does not match "
                  f"pyproject version {version!r}"
              )

          print(f"Verified aoi-orgware {version} from {full_ref}")
          PY

      - name: Install build verification tools
        run: |
          python -m pip install --disable-pip-version-check \
            "build==1.5.0" \
            "twine==6.2.0"

      - name: Run unit tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v

      - name: Build wheel and source distribution
        shell: bash
        run: |
          epoch="$(git show -s --format=%ct HEAD)"
          if [[ ! "$epoch" =~ ^[0-9]+$ ]]; then
            echo "Invalid release commit timestamp" >&2
            exit 1
          fi
          SOURCE_DATE_EPOCH="$epoch" \
            python -m build --sdist --wheel --outdir dist

      - name: Check package metadata
        run: python -m twine check --strict dist/*

      - name: Verify artifact set and excluded files
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path, PurePosixPath
          import tarfile
          import tomllib
          import zipfile

          version = tomllib.loads(
              Path("pyproject.toml").read_text(encoding="utf-8")
          )["project"]["version"]

          dist = Path("dist")
          expected = {
              f"aoi_orgware-{version}-py3-none-any.whl",
              f"aoi_orgware-{version}.tar.gz",
          }
          actual = {path.name for path in dist.iterdir() if path.is_file()}

          if actual != expected:
              raise SystemExit(
                  f"Unexpected distribution set: "
                  f"expected={sorted(expected)!r}, actual={sorted(actual)!r}"
              )

          forbidden = {"PROVENANCE.md", "IMPORT_MANIFEST.json"}
          members = []

          with zipfile.ZipFile(
              dist / f"aoi_orgware-{version}-py3-none-any.whl"
          ) as archive:
              members.extend(archive.namelist())

          with tarfile.open(
              dist / f"aoi_orgware-{version}.tar.gz", "r:gz"
          ) as archive:
              members.extend(archive.getnames())

          unexpected = sorted(
              name
              for name in members
              if PurePosixPath(name).name in forbidden
          )
          if unexpected:
              raise SystemExit(
                  f"Forbidden files found in distributions: {unexpected!r}"
              )

          print("Verified distribution filenames and exclusions")
          PY

      - name: Smoke-test the installed wheel
        shell: bash
        run: |
          python -m venv .smoke-env
          .smoke-env/bin/python -m pip install \
            --disable-pip-version-check \
            --no-deps \
            dist/*.whl

          .smoke-env/bin/python - <<'PY'
          from pathlib import Path
          import subprocess
          import tomllib

          version = tomllib.loads(
              Path("pyproject.toml").read_text(encoding="utf-8")
          )["project"]["version"]

          actual = subprocess.check_output(
              [".smoke-env/bin/aoi", "--version"],
              text=True,
          ).strip()
          if actual != f"AOI {version}":
              raise SystemExit(
                  f"Installed CLI version mismatch: {actual!r}"
              )

          commands = [
              [".smoke-env/bin/aoi", "--help"],
              [".smoke-env/bin/aoi", "codex-init", "--help"],
              [".smoke-env/bin/aoi", "claude-init", "--help"],
              [".smoke-env/bin/aoi-codex-hook", "--help"],
              [".smoke-env/bin/aoi-claude-hook", "--help"],
          ]
          for command in commands:
              subprocess.run(
                  command,
                  check=True,
                  stdout=subprocess.DEVNULL,
              )

          print("Fresh-install smoke test passed")
          PY

      - name: Upload verified distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/aoi-orgware
    permissions:
      id-token: write

    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: dist/

      - name: Publish distributions with Trusted Publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
          verify-metadata: true
          attestations: true
          print-hash: true
