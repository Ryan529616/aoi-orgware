name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  PUBLICATION_POLICY_SHA256: 11ad65c25fee5d4060422001a344faa7c8e06b427e452bd7d48a76231e4b905f

concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - name: Install mkdocs
        run: python -m pip install "mkdocs-material==9.*"
      - name: Build site
        run: mkdocs build --strict
      - name: Preflight GitHub Pages artifact publication
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=src python -m aoi_orgware.publication_gate preflight \
            --policy-snapshot release/publication-policy.json \
            --expected-snapshot-sha256 "$PUBLICATION_POLICY_SHA256" \
            --action artifact_upload \
            --destination "https://github.com/$GITHUB_REPOSITORY/actions/artifacts" \
            --subject site/ \
            --json > "$RUNNER_TEMP/docs-pages-publication-receipt.json"
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
